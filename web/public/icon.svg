<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#222c44"/>
      <stop offset="1" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#bcd2ff" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <filter id="lensShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- app icon shape (rounded squircle) -->
  <g filter="url(#soft)">
    <rect x="112" y="104" width="800" height="800" rx="186" fill="url(#bg)"/>
  </g>
  <rect x="112" y="104" width="800" height="800" rx="186" fill="url(#sheen)"/>
  <rect x="113" y="105" width="798" height="798" rx="185" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>

  <!-- treemap inside -->
  <clipPath id="inner"><rect x="190" y="182" width="644" height="644" rx="104"/></clipPath>
  <g clip-path="url(#inner)">
    <rect x="190" y="182" width="644" height="644" fill="#0c111c"/>
    <rect x="206" y="198" width="298" height="356" rx="20" fill="#4d8cea"/>
    <rect x="520" y="198" width="298" height="214" rx="20" fill="#5cc78d"/>
    <rect x="520" y="430" width="142" height="124" rx="20" fill="#ed8c4d"/>
    <rect x="678" y="430" width="140" height="124" rx="20" fill="#8c80ea"/>
    <rect x="206" y="570" width="196" height="240" rx="20" fill="#66bcdb"/>
    <rect x="418" y="570" width="400" height="240" rx="20" fill="#ccb85c"/>
  </g>

  <!-- magnifying lens -->
  <g filter="url(#lensShadow)">
    <line x1="700" y1="700" x2="812" y2="812" stroke="#0b0f1a" stroke-width="64" stroke-linecap="round"/>
    <line x1="700" y1="700" x2="812" y2="812" stroke="#ffffff" stroke-width="46" stroke-linecap="round"/>
    <circle cx="592" cy="592" r="150" fill="#0b0f1a"/>
    <circle cx="592" cy="592" r="150" fill="#9cc2ff" fill-opacity="0.14"/>
    <circle cx="592" cy="592" r="150" fill="none" stroke="url(#glass)" stroke-width="32"/>
    <ellipse cx="556" cy="548" rx="58" ry="40" fill="#ffffff" fill-opacity="0.35" transform="rotate(-32 556 548)"/>
  </g>
</svg>

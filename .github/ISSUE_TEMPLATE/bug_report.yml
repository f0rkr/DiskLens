name: 🐛 Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill out the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
      placeholder: When I scan ~/Downloads, the treemap shows…
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open DiskLens
        2. Scan '…'
        3. Click '…'
        4. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DiskLens version
      description: See the app's About / the release you downloaded.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 15.4 (Apple Silicon)"
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, console logs, or context. Never paste private file paths you don't want public.
